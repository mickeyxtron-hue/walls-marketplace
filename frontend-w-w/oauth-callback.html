<!DOCTYPE html>
<html>
<head><title>Logging you in...</title></head>
<body>
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const token = params.get('token');
    if (token) {
      localStorage.setItem('ww_token', token);
      fetch('https://walls-marketplace.onrender.com/api/user', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(r => r.json())
      .then(data => {
        if (data.user) {
          localStorage.setItem('ww_user', JSON.stringify(data.user));
          window.WW_APP.user = data.user;
          window.WW_APP.updateUserMenu();
        }
        window.location.href = '/';
      })
      .catch(() => window.location.href = '/');
    } else {
      window.location.href = '/';
    }
  </script>
</body>
</html>
