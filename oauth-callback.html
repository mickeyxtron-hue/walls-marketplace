<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signing you in…</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #FAF8F3; color: #1F1B16; }
    p { font-size: 1rem; }
  </style>
</head>
<body>
  <p>Signing you in…</p>
  <script>
    (function () {
      var apiBase = localStorage.getItem('ww_api_base') || 'https://walls-marketplace.onrender.com';
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var token = params.get('token') || params.get('access_token');
      if (!token) {
        window.location.replace('/');
        return;
      }
      localStorage.setItem('ww_token', token);
      fetch(apiBase + '/api/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/json' }
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var user = data.user || data;
          if (user) {
            localStorage.setItem('ww_user', JSON.stringify(user));
          }
          window.location.replace('/');
        })
        .catch(function () { window.location.replace('/'); });
    })();
  </script>
</body>
</html>
